<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drupal Tip Viewer</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; }
        .container { max-width: 900px; margin: 0 auto; padding: 2rem; }
        header { text-align: center; margin-bottom: 2rem; }
        h1 { font-size: 2rem; color: #00d4ff; margin-bottom: 0.5rem; }
        .subtitle { color: #888; }
        .controls { display: flex; gap: 1rem; align-items: center; justify-content: center; margin-bottom: 2rem; flex-wrap: wrap; }
        select, button { padding: 0.75rem 1.25rem; border-radius: 8px; border: none; font-size: 1rem; cursor: pointer; }
        select { background: #16213e; color: #fff; min-width: 200px; }
        button { background: #00d4ff; color: #1a1a2e; font-weight: 600; transition: transform 0.1s, background 0.2s; }
        button:hover { background: #00b8e6; transform: scale(1.02); }
        button:active { transform: scale(0.98); }
        .tip-card { background: #16213e; border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; border-left: 4px solid #00d4ff; }
        .tip-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .tip-category { background: #00d4ff20; color: #00d4ff; padding: 0.25rem 0.75rem; border-radius: 20px; font-size: 0.85rem; font-weight: 500; }
        .tip-title { font-size: 1.1rem; color: #fff; margin-bottom: 1rem; }
        .tip-content { line-height: 1.7; color: #ccc; }
        .tip-content p { margin-bottom: 1rem; }
        .tip-content pre { background: #0f0f23; padding: 1rem; border-radius: 8px; overflow-x: auto; margin: 1rem 0; }
        .tip-content code { font-family: 'Fira Code', 'Consolas', monospace; font-size: 0.9rem; }
        .tip-content pre code { display: block; }
        .tip-content :not(pre) > code { background: #0f0f23; padding: 0.2rem 0.4rem; border-radius: 4px; }
        .stats { text-align: center; color: #666; margin-top: 2rem; font-size: 0.9rem; }
        .loading { text-align: center; color: #00d4ff; font-size: 1.2rem; padding: 2rem; }
        .empty { text-align: center; color: #888; padding: 2rem; }
        .refresh-btn { background: #e94560; }
        .refresh-btn:hover { background: #d63850; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Drupal Tip Viewer</h1>
            <p class="subtitle">{{ total_tips }} tips across {{ categories|length }} categories</p>
        </header>

        <div class="controls">
            <select id="categorySelect">
                <option value="">All Categories</option>
                {% for cat in categories %}
                <option value="{{ cat.name }}">{{ cat.name }} ({{ cat.count }})</option>
                {% endfor %}
            </select>
            <button onclick="loadRandomTip()">Get Random Tip</button>
            <button onclick="loadAllTips()" class="refresh-btn">Load All Tips</button>
        </div>

        <div id="tipsContainer"></div>

        <p class="stats">Tip data stored locally at <code>{{ tips_dir|default('./tips') }}</code></p>
    </div>

    <script>
        const tipsContainer = document.getElementById('tipsContainer');
        const categorySelect = document.getElementById('categorySelect');

        function formatContent(content) {
            let html = content
                .replace(/```(\w+)?\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/\n\n/g, '</p><p>')
                .replace(/^/, '<p>')
                .replace(/$/, '</p>');
            return html;
        }

        function renderTip(tip) {
            return `
                <div class="tip-card">
                    <div class="tip-header">
                        <span class="tip-category">${tip.category}</span>
                    </div>
                    ${tip.title ? `<h3 class="tip-title">${tip.title}</h3>` : ''}
                    <div class="tip-content">${formatContent(tip.content)}</div>
                </div>
            `;
        }

        function loadRandomTip() {
            tipsContainer.innerHTML = '<div class="loading">Loading...</div>';
            const category = categorySelect.value;
            const url = '/api/random' + (category ? `?category=${category}` : '');
            
            fetch(url)
                .then(r => r.json())
                .then(tip => {
                    if (tip.error) {
                        tipsContainer.innerHTML = `<div class="empty">${tip.error}</div>`;
                    } else {
                        tipsContainer.innerHTML = renderTip(tip);
                    }
                })
                .catch(e => {
                    tipsContainer.innerHTML = `<div class="empty">Error loading tip: ${e}</div>`;
                });
        }

        function loadAllTips() {
            tipsContainer.innerHTML = '<div class="loading">Loading tips...</div>';
            const category = categorySelect.value;
            const url = '/api/tips' + (category ? `?category=${category}` : '');
            
            fetch(url)
                .then(r => r.json())
                .then(data => {
                    if (data.tips.length === 0) {
                        tipsContainer.innerHTML = '<div class="empty">No tips found</div>';
                        return;
                    }
                    tipsContainer.innerHTML = data.tips.map(renderTip).join('');
                })
                .catch(e => {
                    tipsContainer.innerHTML = `<div class="empty">Error loading tips: ${e}</div>`;
                });
        }

        categorySelect.addEventListener('change', () => {
            loadAllTips();
        });

        loadAllTips();
    </script>
</body>
</html>
